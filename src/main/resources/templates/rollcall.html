<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>课堂点名系统 - 点名</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Microsoft YaHei", sans-serif; background: #f5f8fc; color: #3c4655; }
        .nav { background: #4682b4; padding: 12px 30px; display: flex; gap: 20px; }
        .nav a { color: white; text-decoration: none; font-size: 16px; padding: 6px 16px; border-radius: 6px; }
        .nav a.active { background: rgba(255,255,255,0.25); }
        .container { max-width: 700px; margin: 30px auto; text-align: center; }
        h1 { margin-bottom: 10px; }
        .name-card { background: white; border: 2px solid #d0d6e0; border-radius: 14px; padding: 60px;
                     margin: 30px 0; font-size: 56px; font-weight: bold; color: #505a65; }
        .name-card .hit { color: #4682b4; animation: flash 0.5s; }
        .mode { font-size: 14px; margin: 10px 0; }
        .mode.normal { color: #a0aab5; }
        .mode.backup { color: #e67e22; font-weight: bold; }
        .streak { font-size: 13px; color: #a0aab5; }
        .streak.warn { color: #e74c3c; font-weight: bold; }
        .btns { display: flex; gap: 15px; justify-content: center; margin-top: 20px; }
        button { color: white; border: none; padding: 12px 30px; border-radius: 8px; font-size: 16px;
                 cursor: pointer; font-weight: bold; }
        .btn-start { background: #4682b4; }
        .btn-correct { background: #27ae60; }
        .btn-incorrect { background: #e74c3c; }
        .msg { padding: 8px 16px; border-radius: 6px; margin-bottom: 12px; display: inline-block; }
        .msg-success { background: #d4edda; color: #155724; }
        .msg-error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
<div class="nav">
    <a href="/">导入学生</a>
    <a href="/rollcall" class="active">点名</a>
    <a href="/stats">统计</a>
</div>
<div class="container">
    <h1>课堂点名</h1>

    <div th:if="${msg}" class="msg msg-success" th:text="${msg}"></div>
    <div th:if="${error}" class="msg msg-error" th:text="${error}"></div>

    <div class="name-card">
        <span th:if="${current != null}" th:text="${current.name}">---</span>
        <span th:unless="${current != null}" style="color:#a0aab5;">准备点名</span>
    </div>

    <div class="mode" th:classappend="${backup} ? 'backup' : 'normal'">
        <span th:if="${backup}">备用模式 — 从答对多的同学中抽取</span>
        <span th:unless="${backup}">正常模式 — 优先点名次数少的同学</span>
    </div>

    <div class="streak" th:classappend="${streak >= maxStreak} ? 'warn'">
        连续未答对：<span th:text="${streak}">0</span> / <span th:text="${maxStreak}">3</span>
    </div>

    <div class="btns">
        <form th:action="@{/rollcall/next}" method="post">
            <button type="submit" class="btn-start">开始点名</button>
        </form>
        <form th:action="@{/rollcall/correct}" method="post">
            <button type="submit" class="btn-correct">答对</button>
        </form>
        <form th:action="@{/rollcall/incorrect}" method="post">
            <button type="submit" class="btn-incorrect">未答对</button>
        </form>
    </div>
</div>
</body>
</html>
